<script>

const WORKER_URL =
"https://stock-api.saychan21.workers.dev";

let currentSaveName = null;

function addRow(data = {}){

    const tbody = document.getElementById("stockBody");

    const row = document.createElement("tr");

    row.innerHTML = `

        <td>
            <input
                class="ticker-input"
                value="${data.ticker || ''}"
                placeholder="JEPQ"
                onblur="fetchStock(this)"
                onkeydown="handleEnter(event,this)"
            >
        </td>

        <td class="exchange">-</td>

        <td class="price">-</td>
        <td class="changePercent">-</td>
        <td class="changeAmount">-</td>
        <td class="yield">-</td>
        <td class="rate">-</td>
        <td class="freq">-</td>

        <td class="portfolio">
            <input
                class="number-input buyPrice"
                type="number"
                step="0.01"
                value="${data.buyPrice || ''}"
                oninput="updatePortfolio(this)"
            >
        </td>

        <td class="portfolio">
            <input
                class="number-input quantity"
                type="number"
                value="${data.quantity || ''}"
                oninput="updatePortfolio(this)"
            >
        </td>

        <td class="portfolio buyTotal">-</td>
        <td class="portfolio evalTotal">-</td>
        <td class="portfolio profit">-</td>
    `;

    tbody.appendChild(row);

    if(data.ticker){
        fetchStock(row.querySelector(".ticker-input"));
    }
}

function handleEnter(event,input){

    if(event.key === "Enter"){
        fetchStock(input);
    }
}

async function fetchStock(input){

    const ticker =
        input.value.trim().toUpperCase();

    if(!ticker) return;

    const row = input.closest("tr");

    try{

        const res = await fetch(
            `${WORKER_URL}?symbol=${ticker}`
        );

        const data = await res.json();

        if(data.error){

            row.querySelector(".exchange").innerText =
                "API ERROR";

            return;
        }

        const quote = data.quote || {};
        const metric = data.metric || {};
        const profile = data.profile || {};

        row.querySelector(".exchange").innerText =
            profile.exchange || "-";

        row.querySelector(".price").innerText =
            "$" + (quote.c || 0).toFixed(2);

        row.querySelector(".changePercent").innerText =
            (quote.dp || 0).toFixed(2) + "%";

        row.querySelector(".changeAmount").innerText =
            (quote.d || 0).toFixed(2);

        const yieldValue =
            metric.dividendYieldIndicatedAnnual || 0;

        row.querySelector(".yield").innerText =
            yieldValue.toFixed(2) + "%";

        const rate =
            metric.dividendPerShareAnnual || 0;

        row.querySelector(".rate").innerText =
            rate.toFixed(2);

        let freq = "-";

        if(rate >= 10){
            freq = "Monthly";
        }else if(rate >= 1){
            freq = "Quarterly";
        }else if(rate > 0){
            freq = "Yearly";
        }

        row.querySelector(".freq").innerText =
            freq;

        row.dataset.dividendYield = yieldValue;

        updatePortfolio(row);

    }catch(err){

        console.log(err);

        row.querySelector(".exchange").innerText =
            "API ERROR";
    }
}

function updatePortfolio(target){

    const row = target.closest("tr");

    const buyPrice =
        parseFloat(row.querySelector(".buyPrice").value) || 0;

    const quantity =
        parseFloat(row.querySelector(".quantity").value) || 0;

    const currentPrice =
        parseFloat(
            row.querySelector(".price")
            .innerText.replace("$","")
        ) || 0;

    const buyTotal = buyPrice * quantity;

    const evalTotal = currentPrice * quantity;

    const profit = evalTotal - buyTotal;

    row.querySelector(".buyTotal").innerText =
        "$" + buyTotal.toFixed(2);

    row.querySelector(".evalTotal").innerText =
        "$" + evalTotal.toFixed(2);

    const profitCell = row.querySelector(".profit");

    profitCell.innerText =
        (profit > 0 ? "+$" : "-$") +
        Math.abs(profit).toFixed(2);

    profitCell.className = "portfolio profit";

    if(profit > 0){
        profitCell.classList.add("profit-plus");
    }

    if(profit < 0){
        profitCell.classList.add("profit-minus");
    }

    updateSummary();
}

function updateSummary(){

    let totalBuy = 0;
    let totalEval = 0;
    let totalDividend = 0;

    document.querySelectorAll("#stockBody tr").forEach(row=>{

        const buy =
            parseFloat(
                row.querySelector(".buyTotal")
                .innerText.replace("$","")
            ) || 0;

        const evalv =
            parseFloat(
                row.querySelector(".evalTotal")
                .innerText.replace("$","")
            ) || 0;

        const yieldValue =
            parseFloat(row.dataset.dividendYield || 0);

        totalBuy += buy;
        totalEval += evalv;

        totalDividend += evalv * (yieldValue / 100);

    });

    const profitRate =
        totalBuy > 0
        ? ((totalEval-totalBuy)/totalBuy)*100
        : 0;

    document.getElementById("totalBuy").innerText =
        "$" + totalBuy.toFixed(2);

    document.getElementById("totalEval").innerText =
        "$" + totalEval.toFixed(2);

    const profitRateEl =
        document.getElementById("totalProfitRate");

    profitRateEl.innerText =
        (profitRate > 0 ? "+" : "") +
        profitRate.toFixed(2) + "%";

    profitRateEl.style.color =
        profitRate >= 0
        ? "#60a5fa"
        : "#ef4444";

    document.getElementById("yearlyDividend").innerText =
        "$" + totalDividend.toFixed(2);

    document.getElementById("monthlyDividend").innerText =
        "$" + (totalDividend/12).toFixed(2);
}

function collectRows(){

    const rows = [];

    document.querySelectorAll("#stockBody tr")
    .forEach(row=>{

        rows.push({

            ticker:
                row.querySelector(".ticker-input").value,

            buyPrice:
                row.querySelector(".buyPrice").value,

            quantity:
                row.querySelector(".quantity").value
        });

    });

    return rows;
}

function saveCurrent(){

    if(!currentSaveName){

        saveAsData();
        return;
    }

    localStorage.setItem(
        "portfolio_" + currentSaveName,
        JSON.stringify(collectRows())
    );

    alert("저장 완료");
}

function saveAsData(){

    const saveName =
        prompt("새 저장 이름 입력");

    if(!saveName) return;

    currentSaveName = saveName;

    localStorage.setItem(
        "portfolio_" + saveName,
        JSON.stringify(collectRows())
    );

    alert("다른 이름으로 저장 완료");
}

function loadData(){

    const keys = Object.keys(localStorage)
        .filter(k =>
            k.startsWith("portfolio_")
        );

    if(keys.length === 0){

        alert("저장된 데이터 없음");
        return;
    }

    const list = keys
        .map(k =>
            k.replace("portfolio_","")
        )
        .join("\n");

    const selected =
        prompt(
            "불러올 데이터 선택:\n\n" + list
        );

    if(!selected) return;

    const data = JSON.parse(
        localStorage.getItem(
            "portfolio_" + selected
        )
    );

    if(!data){

        alert("해당 저장 없음");
        return;
    }

    currentSaveName = selected;

    document.getElementById("stockBody").innerHTML = "";

    data.forEach(item=>{
        addRow(item);
    });
}

addRow({ticker:"JEPQ"});
addRow({ticker:"SCHD"});
addRow({ticker:"NVDA"});
addRow({ticker:"GOOGL"});

</script>
