<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Dividend Tracker</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

.source{
    margin-bottom:20px;
    color:#666;
    font-size:14px;
}

.source a{
    color:#0077cc;
    text-decoration:none;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#243447;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

input{
    width:95%;
    padding:8px;
    text-align:center;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-bottom:15px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>📊 Dividend Tracker</h1>

<div class="source">
데이터 출처:
<a href="https://finnhub.io" target="_blank">
Finnhub API
</a>
</div>

<button onclick="addRow()">+ 행 추가</button>

<table>

<thead>
<tr>
    <th>Ticker</th>
    <th>거래소</th>
    <th>현재가</th>
    <th>직전 등락률</th>
    <th>등락 금액</th>
    <th>Yield</th>
    <th>Rate</th>
    <th>배당주기</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>

</table>

<datalist id="tickerList">

<option value="JEPQ">
<option value="JEPI">
<option value="SCHD">
<option value="SPYD">
<option value="QYLD">
<option value="O">
<option value="TSLA">
<option value="NVDA">
<option value="AAPL">
<option value="GOOGL">
<option value="MSFT">

</datalist>

<script>

const API_KEY = "여기에_API_KEY";

function addRow(){

    const tbody = document.getElementById("tbody");

    const row = document.createElement("tr");

    row.innerHTML = `

        <td>
            <input
                list="tickerList"
                placeholder="예: JEPQ"
                onkeydown="handleEnter(event,this)"
            >
        </td>

        <td class="exchange"></td>
        <td class="price"></td>
        <td class="changePercent"></td>
        <td class="changeAmount"></td>
        <td class="yield"></td>
        <td class="rate"></td>
        <td class="freq"></td>

    `;

    tbody.appendChild(row);
}

async function handleEnter(event,input){

    if(event.key !== "Enter") return;

    const ticker = input.value.trim().toUpperCase();

    if(!ticker) return;

    const row = input.closest("tr");

    fetchStock(ticker,row);
}

async function fetchStock(ticker,row){

    try{

        const quoteUrl =
        `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`;

        const profileUrl =
        `https://finnhub.io/api/v1/stock/profile2?symbol=${ticker}&token=${API_KEY}`;

        const dividendUrl =
        `https://finnhub.io/api/v1/stock/dividend?symbol=${ticker}&from=2024-01-01&to=2025-12-31&token=${API_KEY}`;

        const quoteRes = await fetch(quoteUrl);
        const profileRes = await fetch(profileUrl);
        const dividendRes = await fetch(dividendUrl);

        const quote = await quoteRes.json();
        const profile = await profileRes.json();
        const dividends = await dividendRes.json();

        row.querySelector(".exchange").innerText =
        profile.exchange || "-";

        row.querySelector(".price").innerText =
        quote.c || "-";

        row.querySelector(".changePercent").innerText =
        quote.dp ? quote.dp.toFixed(2) + "%" : "-";

        row.querySelector(".changeAmount").innerText =
        quote.d ? quote.d.toFixed(2) : "-";

        let yearlyDividend = 0;

        dividends.forEach(d => {
            yearlyDividend += d.amount;
        });

        const yieldValue =
        quote.c
        ? ((yearlyDividend / quote.c) * 100).toFixed(2)
        : 0;

        row.querySelector(".yield").innerText =
        yieldValue + "%";

        row.querySelector(".rate").innerText =
        yearlyDividend.toFixed(2);

        let freq = "-";

        if(dividends.length >= 10){

            freq = "Monthly";
        }
        else if(dividends.length >= 4){

            freq = "Quarterly";
        }
        else if(dividends.length >= 1){

            freq = "Year";
        }

        row.querySelector(".freq").innerText = freq;
    }

    catch(e){

        console.log(e);

        alert("API 오류");
    }
}

addRow();

</script>

</body>
</html>
