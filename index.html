<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Dividend Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    font-family:'Pretendard',sans-serif;
}

body{
    margin:0;
    padding:24px;
    background:#eef4ff;
    color:#1e293b;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:20px;
}

.title{
    font-size:34px;
    font-weight:700;
    color:#2563eb;
}

.source{
    font-size:14px;
    color:#64748b;
}

.source a{
    color:#2563eb;
    text-decoration:none;
}

.buttons{
    margin-bottom:18px;
}

button{
    border:none;
    background:#2563eb;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    margin-right:8px;
    font-size:14px;
    font-weight:600;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

th{
    background:#2563eb;
    color:white;
    padding:14px 10px;
    font-size:14px;
    font-weight:600;
}

th.portfolio{
    background:#1e40af;
}

td{
    border-bottom:1px solid #e2e8f0;
    text-align:center;
    padding:10px 8px;
    font-size:14px;
    font-weight:500;
    color:#334155;
}

td.portfolio{
    background:#f8fbff;
}

tr:hover{
    background:#f8fbff;
}

.ticker-input{
    width:90px;
    padding:8px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    text-align:center;
    font-size:14px;
    background:white;
}

.number-input{
    width:90px;
    padding:8px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    text-align:center;
    font-size:14px;
    background:white;
}

.profit-plus{
    color:#16a34a;
    font-weight:700;
}

.profit-minus{
    color:#dc2626;
    font-weight:700;
}

.summary-wrap{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:14px;
}

.summary-card{
    background:white;
    border-radius:16px;
    padding:18px;
    box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.summary-title{
    font-size:13px;
    color:#64748b;
    margin-bottom:8px;
}

.summary-value{
    font-size:24px;
    font-weight:700;
    color:#2563eb;
}

</style>
</head>

<body>

<div class="topbar">

    <div class="title">
        📊 Dividend Tracker
    </div>

    <div class="source">
        데이터 출처:
        <a href="https://finnhub.io/" target="_blank">
            Finnhub API
        </a>
    </div>

</div>

<div class="buttons">
    <button onclick="addRow()">+ 행 추가</button>
    <button onclick="saveData()">💾 저장</button>
    <button onclick="loadData()">📂 불러오기</button>
</div>

<table>

<thead>

<tr>
    <th>Ticker</th>
    <th>거래소</th>
    <th>현재가</th>
    <th>직전 등락률</th>
    <th>등락 금액</th>
    <th>Yield</th>
    <th>Rate</th>
    <th>배당주기</th>

    <th class="portfolio">구매가</th>
    <th class="portfolio">수량</th>
    <th class="portfolio">매수금액</th>
    <th class="portfolio">평가금액</th>
    <th class="portfolio">손익</th>
</tr>

</thead>

<tbody id="stockBody"></tbody>

</table>

<div class="summary-wrap">

    <div class="summary-card">
        <div class="summary-title">총 구매금액</div>
        <div class="summary-value" id="totalBuy">$0</div>
    </div>

    <div class="summary-card">
        <div class="summary-title">총 평가금액</div>
        <div class="summary-value" id="totalEval">$0</div>
    </div>

    <div class="summary-card">
        <div class="summary-title">총 수익률</div>
        <div class="summary-value" id="totalProfitRate">0%</div>
    </div>

    <div class="summary-card">
        <div class="summary-title">예상 월배당</div>
        <div class="summary-value" id="monthlyDividend">$0</div>
    </div>

    <div class="summary-card">
        <div class="summary-title">예상 연배당</div>
        <div class="summary-value" id="yearlyDividend">$0</div>
    </div>

</div>

<script>

const API_KEY = "d7tfr7pr01qugn0afce0d7tfr7pr01qugn0afceg";

function addRow(data = {}){

    const tbody = document.getElementById("stockBody");

    const row = document.createElement("tr");

    row.innerHTML = `

        <td>
            <input
                class="ticker-input"
                value="${data.ticker || ''}"
                placeholder="JEPQ"
                onblur="fetchStock(this)"
                onkeydown="handleEnter(event,this)"
            >
        </td>

        <td class="exchange">-</td>
        <td class="price">-</td>
        <td class="changePercent">-</td>
        <td class="changeAmount">-</td>
        <td class="yield">-</td>
        <td class="rate">-</td>
        <td class="freq">-</td>

        <td class="portfolio">
            <input
                class="number-input buyPrice"
                type="number"
                step="0.01"
                value="${data.buyPrice || ''}"
                oninput="updatePortfolio(this)"
            >
        </td>

        <td class="portfolio">
            <input
                class="number-input quantity"
                type="number"
                value="${data.quantity || ''}"
                oninput="updatePortfolio(this)"
            >
        </td>

        <td class="portfolio buyTotal">-</td>
        <td class="portfolio evalTotal">-</td>
        <td class="portfolio profit">-</td>

    `;

    tbody.appendChild(row);

    if(data.ticker){
        fetchStock(row.querySelector(".ticker-input"));
    }
}

function handleEnter(event,input){

    if(event.key === "Enter"){
        fetchStock(input);
    }
}

async function fetchStock(input){

    const ticker = input.value.trim().toUpperCase();

    if(!ticker) return;

    const row = input.closest("tr");

    try{

        const quoteRes = await fetch(
            `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`
        );

        const quote = await quoteRes.json();

        const profileRes = await fetch(
            `https://finnhub.io/api/v1/stock/profile2?symbol=${ticker}&token=${API_KEY}`
        );

        const profile = await profileRes.json();

        const metricRes = await fetch(
            `https://finnhub.io/api/v1/stock/metric?symbol=${ticker}&metric=all&token=${API_KEY}`
        );

        const metricData = await metricRes.json();

        const metric = metricData.metric || {};

        row.querySelector(".exchange").innerText =
            profile.exchange || "-";

        row.querySelector(".price").innerText =
            quote.c ? "$" + quote.c.toFixed(2) : "-";

        row.querySelector(".changePercent").innerText =
            quote.dp ? quote.dp.toFixed(2) + "%" : "-";

        row.querySelector(".changeAmount").innerText =
            quote.d ? quote.d.toFixed(2) : "-";

        const yieldValue =
            metric.dividendYieldIndicatedAnnual || 0;

        row.querySelector(".yield").innerText =
            yieldValue.toFixed(2) + "%";

        const rate =
            metric.dividendPerShareAnnual || 0;

        row.querySelector(".rate").innerText =
            rate.toFixed(2);

        let freq = "-";

        if(rate >= 10){
            freq = "Monthly";
        }else if(rate >= 1){
            freq = "Quarterly";
        }else if(rate > 0){
            freq = "Yearly";
        }

        row.querySelector(".freq").innerText = freq;

        row.dataset.dividendYield = yieldValue;

        updatePortfolio(row);

    }catch(err){

        console.log(err);

        row.querySelector(".exchange").innerText = "API ERROR";
    }
}

function updatePortfolio(target){

    const row = target.closest("tr");

    const buyPrice =
        parseFloat(row.querySelector(".buyPrice").value) || 0;

    const quantity =
        parseFloat(row.querySelector(".quantity").value) || 0;

    const currentPrice =
        parseFloat(
            row.querySelector(".price")
            .innerText.replace("$","")
        ) || 0;

    const buyTotal = buyPrice * quantity;

    const evalTotal = currentPrice * quantity;

    const profit = evalTotal - buyTotal;

    row.querySelector(".buyTotal").innerText =
        "$" + buyTotal.toFixed(2);

    row.querySelector(".evalTotal").innerText =
        "$" + evalTotal.toFixed(2);

    const profitCell = row.querySelector(".profit");

    profitCell.innerText =
        "$" + profit.toFixed(2);

    profitCell.className = "portfolio profit";

    if(profit > 0){
        profitCell.classList.add("profit-plus");
    }

    if(profit < 0){
        profitCell.classList.add("profit-minus");
    }

    updateSummary();
}

function updateSummary(){

    let totalBuy = 0;
    let totalEval = 0;
    let totalDividend = 0;

    document.querySelectorAll("#stockBody tr").forEach(row=>{

        const buy =
            parseFloat(
                row.querySelector(".buyTotal")
                .innerText.replace("$","")
            ) || 0;

        const evalv =
            parseFloat(
                row.querySelector(".evalTotal")
                .innerText.replace("$","")
            ) || 0;

        const yieldValue =
            parseFloat(row.dataset.dividendYield || 0);

        totalBuy += buy;
        totalEval += evalv;

        totalDividend += evalv * (yieldValue / 100);

    });

    const profitRate =
        totalBuy > 0
        ? ((totalEval-totalBuy)/totalBuy)*100
        : 0;

    document.getElementById("totalBuy").innerText =
        "$" + totalBuy.toFixed(2);

    document.getElementById("totalEval").innerText =
        "$" + totalEval.toFixed(2);

    document.getElementById("totalProfitRate").innerText =
        profitRate.toFixed(2) + "%";

    document.getElementById("yearlyDividend").innerText =
        "$" + totalDividend.toFixed(2);

    document.getElementById("monthlyDividend").innerText =
        "$" + (totalDividend/12).toFixed(2);
}

function saveData(){

    const saveName = prompt("저장 이름 입력");

    if(!saveName) return;

    const rows = [];

    document.querySelectorAll("#stockBody tr").forEach(row=>{

        rows.push({

            ticker:
                row.querySelector(".ticker-input").value,

            buyPrice:
                row.querySelector(".buyPrice").value,

            quantity:
                row.querySelector(".quantity").value
        });

    });

    localStorage.setItem(
        "portfolio_" + saveName,
        JSON.stringify(rows)
    );

    alert("저장 완료");
}

function loadData(){

    const saveName = prompt("불러올 저장 이름 입력");

    if(!saveName) return;

    const data = JSON.parse(
        localStorage.getItem("portfolio_" + saveName)
    );

    if(!data){

        alert("저장 데이터 없음");
        return;
    }

    document.getElementById("stockBody").innerHTML = "";

    data.forEach(item=>{
        addRow(item);
    });
}

addRow({ticker:"JEPQ"});
addRow({ticker:"SCHD"});
addRow({ticker:"NVDA"});
addRow({ticker:"GOOGL"});

</script>

</body>
</html>
