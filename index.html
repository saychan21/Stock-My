<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Dividend Tracker</title>

<style>
body{
    font-family: Arial;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:15px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.source{
    font-size:14px;
    color:#666;
}

.source a{
    color:#4a63d8;
    text-decoration:none;
}

.buttons{
    margin-bottom:15px;
}

button{
    padding:10px 16px;
    margin-right:6px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#1f2940;
    color:white;
    padding:10px;
    font-size:15px;
}

td{
    border:1px solid #ddd;
    text-align:center;
    padding:6px;
    height:40px;
}

.ticker-input{
    width:100px;
    padding:6px;
    font-size:16px;
    text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="title">📊 Dividend Tracker</div>

    <div class="source">
        데이터 출처:
        <a href="https://finnhub.io/" target="_blank">
            Finnhub API
        </a>
    </div>
</div>

<div class="buttons">
    <button onclick="addRow()">+ 행 추가</button>
    <button onclick="saveData()">💾 저장</button>
    <button onclick="loadData()">📂 불러오기</button>
</div>

<table>
<thead>
<tr>
    <th>Ticker</th>
    <th>거래소</th>
    <th>현재가</th>
    <th>직전 등락률</th>
    <th>등락 금액</th>
    <th>Yield</th>
    <th>Rate</th>
    <th>배당주기</th>
</tr>
</thead>

<tbody id="stockBody">
</tbody>
</table>

<script>

const API_KEY = "d7tfr7pr01qugn0afce0d7tfr7pr01qugn0afceg";

function addRow(tickerValue=""){
    const tbody = document.getElementById("stockBody");

    const row = document.createElement("tr");

    row.innerHTML = `
        <td>
            <input
                class="ticker-input"
                value="${tickerValue}"
                placeholder="JEPQ"
                onblur="fetchStock(this)"
                onkeydown="handleEnter(event,this)"
            >
        </td>

        <td class="exchange">-</td>
        <td class="price">-</td>
        <td class="changePercent">-</td>
        <td class="changeAmount">-</td>
        <td class="yield">-</td>
        <td class="rate">-</td>
        <td class="freq">-</td>
    `;

    tbody.appendChild(row);

    if(tickerValue){
        fetchStock(row.querySelector("input"));
    }
}

function handleEnter(event,input){
    if(event.key === "Enter"){
        fetchStock(input);
    }
}

async function fetchStock(input){

    const ticker = input.value.trim().toUpperCase();

    if(!ticker) return;

    const row = input.closest("tr");

    try{

        const quoteRes = await fetch(
            `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`
        );

        const quote = await quoteRes.json();

        const profileRes = await fetch(
            `https://finnhub.io/api/v1/stock/profile2?symbol=${ticker}&token=${API_KEY}`
        );

        const profile = await profileRes.json();

        const metricRes = await fetch(
            `https://finnhub.io/api/v1/stock/metric?symbol=${ticker}&metric=all&token=${API_KEY}`
        );

        const metricData = await metricRes.json();

        const metric = metricData.metric || {};

        row.querySelector(".exchange").innerText =
            profile.exchange || "-";

        row.querySelector(".price").innerText =
            quote.c ? "$" + quote.c.toFixed(2) : "-";

        row.querySelector(".changePercent").innerText =
            quote.dp ? quote.dp.toFixed(2) + "%" : "-";

        row.querySelector(".changeAmount").innerText =
            quote.d ? quote.d.toFixed(2) : "-";

        const yieldValue =
            metric.dividendYieldIndicatedAnnual || 0;

        row.querySelector(".yield").innerText =
            yieldValue.toFixed(2) + "%";

        const rate =
            metric.dividendPerShareAnnual || 0;

        row.querySelector(".rate").innerText =
            rate.toFixed(2);

        let freq = "-";

        if(rate >= 10){
            freq = "Monthly";
        }else if(rate >= 1){
            freq = "Quarterly";
        }else if(rate > 0){
            freq = "Yearly";
        }

        row.querySelector(".freq").innerText = freq;

    }catch(err){

        console.log(err);

        row.querySelector(".exchange").innerText = "API ERROR";
    }
}

function saveData(){

    const tickers = [];

    document.querySelectorAll(".ticker-input").forEach(input=>{
        tickers.push(input.value);
    });

    localStorage.setItem(
        "dividend_tickers",
        JSON.stringify(tickers)
    );

    alert("저장 완료");
}

function loadData(){

    const data = JSON.parse(
        localStorage.getItem("dividend_tickers")
    );

    if(!data) return;

    document.getElementById("stockBody").innerHTML = "";

    data.forEach(ticker=>{
        addRow(ticker);
    });
}

loadData();

if(document.getElementById("stockBody").children.length === 0){

    addRow("JEPQ");
    addRow("SCHD");
    addRow("NVDA");
    addRow("GOOGL");
}

</script>

</body>
</html>
