<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Dividend Tracker</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h1{
    margin:0;
}

.source{
    color:#666;
    font-size:14px;
}

.source a{
    color:#0077cc;
    text-decoration:none;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-bottom:15px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#243447;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

input{
    width:95%;
    padding:8px;
    text-align:center;
    font-size:16px;
}

</style>

</head>

<body>

<div class="topbar">

    <h1>📊 Dividend Tracker</h1>

    <div class="source">
        데이터 출처:
        <a href="https://finnhub.io" target="_blank">
            Finnhub API
        </a>
    </div>

</div>

<button onclick="addRow()">+ 행 추가</button>

<table>

<thead>
<tr>
    <th>Ticker</th>
    <th>거래소</th>
    <th>현재가</th>
    <th>직전 등락률</th>
    <th>등락 금액</th>
    <th>Yield</th>
    <th>Rate</th>
    <th>배당주기</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>

</table>

<datalist id="tickerList">

<option value="JEPQ">
<option value="JEPI">
<option value="SCHD">
<option value="SPYD">
<option value="QYLD">
<option value="O">
<option value="TSLA">
<option value="NVDA">
<option value="AAPL">
<option value="GOOGL">
<option value="MSFT">

</datalist>

<script>

// 🔥 네 API KEY 넣기
const API_KEY = "여기에_네_API_KEY_입력";

function addRow(){

    const tbody = document.getElementById("tbody");

    const row = document.createElement("tr");

    row.innerHTML = `

        <td>
            <input
                list="tickerList"
                placeholder="예: JEPQ"
                onkeydown="handleEnter(event,this)"
            >
        </td>

        <td class="exchange">-</td>
        <td class="price">-</td>
        <td class="changePercent">-</td>
        <td class="changeAmount">-</td>
        <td class="yield">-</td>
        <td class="rate">-</td>
        <td class="freq">-</td>

    `;

    tbody.appendChild(row);
}

async function handleEnter(event,input){

    if(event.key !== "Enter") return;

    const ticker = input.value.trim().toUpperCase();

    if(!ticker) return;

    const row = input.closest("tr");

    fetchStock(ticker,row);
}

async function fetchStock(ticker,row){

    try{

        // 현재가 정보
        const quoteUrl =
        `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`;

        // 회사 정보
        const profileUrl =
        `https://finnhub.io/api/v1/stock/profile2?symbol=${ticker}&token=${API_KEY}`;

        // 배당 정보
        const dividendUrl =
        `https://finnhub.io/api/v1/stock/dividend?symbol=${ticker}&from=2024-01-01&to=2025-12-31&token=${API_KEY}`;

        const [
            quoteRes,
            profileRes,
            dividendRes
        ] = await Promise.all([
            fetch(quoteUrl),
            fetch(profileUrl),
            fetch(dividendUrl)
        ]);

        const quote = await quoteRes.json();
        const profile = await profileRes.json();
        const dividends = await dividendRes.json();

        console.log("QUOTE:", quote);
        console.log("PROFILE:", profile);
        console.log("DIVIDENDS:", dividends);

        // 거래소
        row.querySelector(".exchange").innerText =
        profile.exchange || "-";

        // 현재가
        row.querySelector(".price").innerText =
        quote.c || "-";

        // 등락률
        row.querySelector(".changePercent").innerText =
        quote.dp
        ? quote.dp.toFixed(2) + "%"
        : "-";

        // 등락 금액
        row.querySelector(".changeAmount").innerText =
        quote.d
        ? quote.d.toFixed(2)
        : "-";

        // 연 배당 합산
        let yearlyDividend = 0;

        if(Array.isArray(dividends)){

            dividends.forEach(d => {

                yearlyDividend += d.amount || 0;
            });
        }

        // Yield 계산
        let yieldValue = 0;

        if(quote.c){

            yieldValue =
            ((yearlyDividend / quote.c) * 100).toFixed(2);
        }

        row.querySelector(".yield").innerText =
        yieldValue + "%";

        // 배당 Rate
        row.querySelector(".rate").innerText =
        yearlyDividend.toFixed(2);

        // 배당 주기
        let freq = "-";

        if(dividends.length >= 10){

            freq = "Monthly";
        }
        else if(dividends.length >= 4){

            freq = "Quarterly";
        }
        else if(dividends.length >= 1){

            freq = "Yearly";
        }

        row.querySelector(".freq").innerText =
        freq;

    }

    catch(e){

        console.error(e);

        alert("API 오류 발생");
    }
}

// 기본 행 생성
addRow();

</script>

</body>
</html>
