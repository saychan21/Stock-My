<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Dividend Tracker</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:15px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

h1{
    margin:0;
    font-size:28px;
}

.source{
    color:#666;
    font-size:14px;
}

.source a{
    color:#0077cc;
    text-decoration:none;
}

button{
    padding:8px 16px;
    font-size:14px;
    margin-bottom:12px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#243447;
    color:white;
    padding:10px 6px;
    font-size:14px;
}

td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
    height:42px;
    font-size:14px;
}

.tickerInput{
    width:120px;
    padding:6px;
    text-align:center;
    font-size:15px;
}

.smallCell{
    width:90px;
}

.mediumCell{
    width:130px;
}

.loading{
    color:#999;
}

</style>

</head>

<body>

<div class="topbar">

    <h1>📊 Dividend Tracker</h1>

    <div class="source">
        데이터 출처:
        <a href="https://finnhub.io" target="_blank">
            Finnhub API
        </a>
    </div>

</div>

<button onclick="addRow()">+ 행 추가</button>

<table>

<thead>
<tr>
    <th class="smallCell">Ticker</th>
    <th class="smallCell">거래소</th>
    <th class="smallCell">현재가</th>
    <th class="mediumCell">직전 등락률</th>
    <th class="mediumCell">등락 금액</th>
    <th class="smallCell">Yield</th>
    <th class="smallCell">Rate</th>
    <th class="smallCell">배당주기</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>

</table>

<datalist id="tickerList">

<option value="JEPQ">
<option value="JEPI">
<option value="SCHD">
<option value="SPYD">
<option value="QYLD">
<option value="O">
<option value="TSLA">
<option value="NVDA">
<option value="AAPL">
<option value="GOOGL">
<option value="MSFT">

</datalist>

<script>

// 🔥 Finnhub API KEY 입력
const API_KEY = "여기에_API_KEY_입력";

// 기본 종목
const defaultTickers = [
    "JEPQ",
    "SCHD",
    "NVDA",
    "GOOGL"
];

// 행 생성
function addRow(defaultTicker=""){

    const tbody =
    document.getElementById("tbody");

    const row =
    document.createElement("tr");

    row.innerHTML = `

        <td>
            <input
                class="tickerInput"
                list="tickerList"
                placeholder="JEPQ"
                value="${defaultTicker}"
                onchange="tickerChanged(this)"
            >
        </td>

        <td class="exchange loading">-</td>
        <td class="price loading">-</td>
        <td class="changePercent loading">-</td>
        <td class="changeAmount loading">-</td>
        <td class="yield loading">-</td>
        <td class="rate loading">-</td>
        <td class="freq loading">-</td>

    `;

    tbody.appendChild(row);

    if(defaultTicker){

        fetchStock(defaultTicker,row);
    }
}

// ticker 변경
function tickerChanged(input){

    const ticker =
    input.value.trim().toUpperCase();

    if(!ticker) return;

    const row =
    input.closest("tr");

    fetchStock(ticker,row);
}

// API 조회
async function fetchStock(ticker,row){

    try{

        // 🔥 quote
        const quoteRes =
        await fetch(
            `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`
        );

        const quote =
        await quoteRes.json();

        console.log("QUOTE",quote);

        // 🔥 profile
        const profileRes =
        await fetch(
            `https://finnhub.io/api/v1/stock/profile2?symbol=${ticker}&token=${API_KEY}`
        );

        const profile =
        await profileRes.json();

        console.log("PROFILE",profile);

        // 🔥 dividend
        const dividendRes =
        await fetch(
            `https://finnhub.io/api/v1/stock/dividend?symbol=${ticker}&from=2024-01-01&to=2025-12-31&token=${API_KEY}`
        );

        const dividends =
        await dividendRes.json();

        console.log("DIVIDEND",dividends);

        // 🔥 API 제한 또는 오류 확인
        if(quote.error){

            alert("API KEY 오류");

            return;
        }

        // 거래소
        row.querySelector(".exchange").innerText =
        profile.exchange || "-";

        // 현재가
        row.querySelector(".price").innerText =
        quote.c
        ? "$" + quote.c.toFixed(2)
        : "-";

        // 직전 등락률
        row.querySelector(".changePercent").innerText =
        quote.dp
        ? quote.dp.toFixed(2) + "%"
        : "0%";

        // 등락 금액
        row.querySelector(".changeAmount").innerText =
        quote.d
        ? "$" + quote.d.toFixed(2)
        : "$0";

        // 연 배당금
        let yearlyDividend = 0;

        if(Array.isArray(dividends)){

            dividends.forEach(d => {

                yearlyDividend += d.amount || 0;
            });
        }

        // Yield 계산
        let yieldValue = 0;

        if(quote.c && yearlyDividend){

            yieldValue =
            ((yearlyDividend / quote.c) * 100).toFixed(2);
        }

        row.querySelector(".yield").innerText =
        yieldValue + "%";

        // Rate
        row.querySelector(".rate").innerText =
        yearlyDividend.toFixed(2);

        // 배당주기
        let freq = "-";

        if(dividends.length >= 10){

            freq = "Monthly";
        }
        else if(dividends.length >= 4){

            freq = "Quarterly";
        }
        else if(dividends.length >= 1){

            freq = "Yearly";
        }

        row.querySelector(".freq").innerText =
        freq;

    }

    catch(e){

        console.log(e);

        alert("API 오류");
    }
}

// 기본 종목 생성
defaultTickers.forEach(ticker => {

    addRow(ticker);
});

</script>

</body>
</html>
