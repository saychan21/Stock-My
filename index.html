<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Dividend Tracker</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#243447;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

input{
    width:95%;
    padding:8px;
    text-align:center;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-bottom:15px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>📊 Dividend Tracker</h1>

<button onclick="addRow()">+ 행 추가</button>

<table>

<thead>
<tr>
    <th>Ticker</th>
    <th>현재가</th>
    <th>등락률</th>
    <th>고가</th>
    <th>저가</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>

</table>

<datalist id="tickerList">

<option value="JEPQ">
<option value="JEPI">
<option value="SCHD">
<option value="SPYD">
<option value="QYLD">
<option value="TSLA">
<option value="NVDA">
<option value="AAPL">
<option value="GOOGL">
<option value="MSFT">

</datalist>

<script>

const API_KEY = "여기에_API_KEY";

function addRow(){

    const tbody = document.getElementById("tbody");

    const row = document.createElement("tr");

    row.innerHTML = `

        <td>
            <input
                list="tickerList"
                placeholder="Ticker 입력"
                onkeydown="handleEnter(event,this)"
            >
        </td>

        <td class="price"></td>
        <td class="change"></td>
        <td class="high"></td>
        <td class="low"></td>

    `;

    tbody.appendChild(row);
}

async function handleEnter(event,input){

    if(event.key !== "Enter") return;

    const ticker = input.value.trim().toUpperCase();

    if(!ticker) return;

    const row = input.closest("tr");

    fetchStock(ticker,row);
}

async function fetchStock(ticker,row){

    try{

        const url =
        `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`;

        const res = await fetch(url);

        const data = await res.json();

        row.querySelector(".price").innerText =
        data.c || "-";

        row.querySelector(".change").innerText =
        data.dp ? data.dp.toFixed(2) + "%" : "-";

        row.querySelector(".high").innerText =
        data.h || "-";

        row.querySelector(".low").innerText =
        data.l || "-";

    }

    catch(e){

        console.log(e);

        alert("API 오류");
    }
}

addRow();

</script>

</body>

</html>
